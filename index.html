<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizzatore 3D</title>
    <!-- Importa il componente model-viewer di Google -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        model-viewer {
            width: 90vw;
            height: 90vh;
            background-color: #1e293b;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <!-- Sostituisci "modello.gltf" con il percorso reale del tuo file -->
    <model-viewer 
        src="modello.gltf" 
        autoplay 
        camera-controls 
        shadow-intensity="1" 
        ar>
    </model-viewer>

</body>
</html>
